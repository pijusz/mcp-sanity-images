name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: mcp-sanity-images-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: mcp-sanity-images-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: mcp-sanity-images-linux-x64
          - os: windows-latest
            target: bun-windows-x64
            artifact: mcp-sanity-images-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bun -e "const p=require('./package.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
        shell: bash

      - run: bun install --frozen-lockfile

      - run: bun test

      - name: Build standalone binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile=${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/*/mcp-sanity-images-* 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*/mcp-sanity-images-*

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: bun install --frozen-lockfile

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          bun -e "const p=require('./package.json');p.version='$VERSION';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Build for npm
        run: bun build src/index.ts --bundle --target node --outfile dist/index.js && sed -i '1s|#!/usr/bin/env bun|#!/usr/bin/env node|' dist/index.js

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
